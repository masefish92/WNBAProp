<title>WNBA Edge — Game Predictions</title>
<style>
:root{
  --bg:#101216; --card:#1b1f26; --card2:#22272f; --line:#2e343e;
  --ink:#eef1f5; --ink2:#a8b0bc; --ink3:#79818e;
  --accent:#f45514; --accent-ink:#ff7a45; --away:#4a7db5;
  --good:#3ba55f; --bad:#d65454; --chipring:rgba(255,255,255,.14);
  --shadow:0 1px 2px rgba(0,0,0,.4);
}
@media (prefers-color-scheme: light){
  :root{
    --bg:#f2f1ee; --card:#ffffff; --card2:#f7f6f4; --line:#e2e0db;
    --ink:#1c1e24; --ink2:#565c66; --ink3:#83898f;
    --accent:#f04e0e; --accent-ink:#d84408; --away:#4a7db5;
    --good:#217a43; --bad:#bb3535; --chipring:rgba(0,0,0,.12);
    --shadow:0 1px 3px rgba(20,18,14,.08);
  }
}
:root[data-theme="light"]{
  --bg:#f2f1ee; --card:#ffffff; --card2:#f7f6f4; --line:#e2e0db;
  --ink:#1c1e24; --ink2:#565c66; --ink3:#83898f;
  --accent:#f04e0e; --accent-ink:#d84408; --away:#4a7db5;
  --good:#217a43; --bad:#bb3535; --chipring:rgba(0,0,0,.12);
  --shadow:0 1px 3px rgba(20,18,14,.08);
}
:root[data-theme="dark"]{
  --bg:#101216; --card:#1b1f26; --card2:#22272f; --line:#2e343e;
  --ink:#eef1f5; --ink2:#a8b0bc; --ink3:#79818e;
  --accent:#f45514; --accent-ink:#ff7a45; --away:#4a7db5;
  --good:#3ba55f; --bad:#d65454; --chipring:rgba(255,255,255,.14);
  --shadow:0 1px 2px rgba(0,0,0,.4);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font:15px/1.55 system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
  -webkit-font-smoothing:antialiased;
}
.wrap{max-width:1060px;margin:0 auto;padding:0 20px 80px}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-variant-numeric:tabular-nums}

/* ---------- header ---------- */
header{padding:34px 0 10px;display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 18px}
.brand{font-size:34px;font-weight:900;letter-spacing:-.5px;text-transform:uppercase;line-height:1;text-wrap:balance}
.brand .dot{color:var(--accent)}
.tagline{color:var(--ink2);font-size:14px}
.updated{margin-left:auto;color:var(--ink3);font-size:12.5px;text-transform:uppercase;letter-spacing:.08em}

/* ---------- stat tiles ---------- */
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin:18px 0 34px}
.tile{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;box-shadow:var(--shadow)}
.tile .k{font-size:26px;font-weight:800;letter-spacing:-.3px}
.tile .k small{font-size:15px;color:var(--ink3);font-weight:600}
.tile .l{color:var(--ink2);font-size:12px;text-transform:uppercase;letter-spacing:.07em;margin-top:2px}

/* ---------- sections ---------- */
h2{font-size:15px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;
   margin:40px 0 14px;display:flex;align-items:center;gap:10px}
h2::after{content:"";flex:1;height:1px;background:var(--line)}
.daylabel{color:var(--ink2);font-size:12.5px;text-transform:uppercase;letter-spacing:.09em;margin:20px 0 8px;font-weight:700}

/* ---------- game cards ---------- */
.games{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:10px}
.game{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;box-shadow:var(--shadow)}
.game .row{display:flex;align-items:center;gap:10px}
.game .meta{color:var(--ink3);font-size:12px;display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px}
.game .meta .n{color:var(--accent-ink);font-weight:700}
.teamline{display:flex;align-items:center;gap:9px;padding:3px 0}
.teamline .abbr{font-weight:800;font-size:15px;width:44px}
.teamline .rec{color:var(--ink3);font-size:12px}
.teamline .proj{margin-left:auto;font-weight:700;font-size:16px}
.teamline.fav .proj{color:var(--accent-ink)}
.chip{width:22px;height:22px;border-radius:6px;flex:none;box-shadow:inset 0 0 0 1.5px var(--chipring)}
.probbar{display:flex;height:12px;border-radius:6px;overflow:hidden;margin:10px 0 6px;gap:2px}
.probbar>div{min-width:8px}
.probbar .h{background:var(--accent)}
.probbar .a{background:var(--away)}
.probpct{display:flex;justify-content:space-between;font-size:12px;color:var(--ink2)}
.pick{margin-top:9px;padding-top:9px;border-top:1px dashed var(--line);display:flex;flex-wrap:wrap;gap:6px 14px;font-size:13px;color:var(--ink2)}
.pick b{color:var(--ink)}
.showmore{margin:18px auto 0;display:block;background:var(--card2);border:1px solid var(--line);color:var(--ink);
  font:600 13px system-ui,sans-serif;padding:9px 22px;border-radius:8px;cursor:pointer}
.showmore:hover{border-color:var(--accent)}

/* ---------- simulator ---------- */
.sim{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px;box-shadow:var(--shadow)}
.sim .controls{display:flex;flex-wrap:wrap;gap:12px;align-items:end}
.sim label{display:block;font-size:11.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink2);margin-bottom:5px;font-weight:700}
.sim select{background:var(--card2);color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:9px 10px;font:600 14px system-ui,sans-serif;min-width:210px}
.sim .vs{font-weight:900;color:var(--ink3);padding-bottom:10px}
.sim .neutral{display:flex;align-items:center;gap:7px;padding-bottom:10px;color:var(--ink2);font-size:13.5px}
.sim .neutral input{accent-color:var(--accent);width:16px;height:16px}
.simout{margin-top:16px;padding-top:16px;border-top:1px solid var(--line)}
.simhead{font-size:19px;font-weight:800;margin-bottom:4px}
.simhead .fav{color:var(--accent-ink)}
.simdetail{color:var(--ink2);font-size:13.5px;display:flex;flex-wrap:wrap;gap:6px 18px;margin-top:8px}
.simdetail b{color:var(--ink)}

/* ---------- rankings table ---------- */
.tablewrap{overflow-x:auto;background:var(--card);border:1px solid var(--line);border-radius:12px;box-shadow:var(--shadow)}
table{border-collapse:collapse;width:100%;min-width:640px}
th{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);text-align:left;padding:12px 14px 8px;border-bottom:1px solid var(--line);font-weight:700}
th.r,td.r{text-align:right}
td{padding:9px 14px;border-bottom:1px solid var(--line);font-size:14px}
tr:last-child td{border-bottom:0}
td .tname{display:flex;align-items:center;gap:10px;font-weight:700}
td.rank{color:var(--ink3);font-weight:800;width:30px}
.spark{display:block}
.spark polyline{fill:none;stroke:var(--accent);stroke-width:2;stroke-linejoin:round;stroke-linecap:round}
.spark circle{fill:var(--accent)}

/* ---------- recent ---------- */
.recent{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:8px}
.res{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 14px;display:flex;align-items:center;gap:10px;font-size:13.5px}
.res .score{font-weight:800;font-size:14.5px;white-space:nowrap}
.res .who{color:var(--ink2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.res .date{color:var(--ink3);font-size:11.5px}
.res .pill{margin-left:auto;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;
  padding:3px 8px;border-radius:99px;flex:none}
.pill.hit{color:var(--good);background:color-mix(in srgb,var(--good) 14%,transparent)}
.pill.miss{color:var(--bad);background:color-mix(in srgb,var(--bad) 13%,transparent)}

/* ---------- about ---------- */
.about{color:var(--ink2);max-width:68ch;font-size:14.5px}
.about b{color:var(--ink)}
.about code{font-family:ui-monospace,Menlo,monospace;font-size:13px;background:var(--card2);border:1px solid var(--line);border-radius:5px;padding:1px 5px}
.foot{margin-top:44px;color:var(--ink3);font-size:12.5px;border-top:1px solid var(--line);padding-top:14px}
.foot a{color:var(--ink2)}

/* tooltip */
#tip{position:fixed;pointer-events:none;background:var(--card2);border:1px solid var(--line);color:var(--ink);
  font:600 12px ui-monospace,Menlo,monospace;padding:5px 8px;border-radius:6px;box-shadow:var(--shadow);
  display:none;z-index:10;white-space:nowrap}
@media (prefers-reduced-motion: no-preference){
  .game,.tile{transition:border-color .15s}
  .game:hover{border-color:var(--accent)}
}
</style>

<div class="wrap">
<header>
  <div class="brand">WNBA<span class="dot">&middot;</span>EDGE</div>
  <div class="tagline">Elo-powered game winner &amp; spread projections</div>
  <div class="updated" id="updated"></div>
</header>

<div class="tiles" id="tiles"></div>

<h2 id="upcoming">Upcoming games</h2>
<div id="gamesroot"></div>
<button class="showmore" id="showmore">Show full remaining schedule</button>

<h2 id="simulator">Matchup simulator</h2>
<div class="sim">
  <div class="controls">
    <div><label for="selAway">Away team</label><select id="selAway"></select></div>
    <div class="vs">@</div>
    <div><label for="selHome">Home team</label><select id="selHome"></select></div>
    <div class="neutral"><input type="checkbox" id="neutral"><label for="neutral" style="all:unset;cursor:pointer">Neutral court</label></div>
  </div>
  <div class="simout" id="simout"></div>
</div>

<h2 id="rankings">Power rankings</h2>
<div class="tablewrap">
<table>
  <thead><tr>
    <th></th><th>Team</th><th class="r">Record</th><th class="r">Elo</th>
    <th>Season Elo trend</th><th class="r">Off ppg*</th><th class="r">Def ppg*</th>
  </tr></thead>
  <tbody id="rankbody"></tbody>
</table>
</div>
<p style="color:var(--ink3);font-size:12px">*Recency-weighted scoring averages used for total-points projections.</p>

<h2 id="recent">Recent results &mdash; how the model did</h2>
<div class="recent" id="recentroot"></div>

<h2 id="method">Method &amp; honesty box</h2>
<div class="about" id="about"></div>

<div class="foot">
  Data: ESPN via the <a href="https://github.com/sportsdataverse/wehoop-wnba-raw">sportsdataverse/wehoop</a> project.
  Predictions are statistical estimates for entertainment/analysis &mdash; not betting advice.
</div>
</div>
<div id="tip"></div>

<script>
const D = __DATA_JSON__;

const $ = (s)=>document.querySelector(s);
const teams = D.teams;
const P = D.params; // {home_adv, elo_per_point, ...}
const fmtPct = (p)=>Math.round(p*100)+"%";
const esc = (s)=>String(s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

/* header + tiles */
$("#updated").textContent = "Updated " + new Date(D.generated).toLocaleString(undefined,{month:"short",day:"numeric",hour:"numeric",minute:"2-digit"});
const M = D.metrics;
$("#tiles").innerHTML = [
  [fmtPct(M.all.accuracy),"Winner accuracy &middot; backtest "+M.eval_from+"&ndash;"+D.season],
  [fmtPct(M.season.accuracy),"Winner accuracy &middot; "+D.season+" season"],
  [(+M.all.spread_mae).toFixed(1)+"<small> pts</small>","Avg. spread error"],
  [M.all.n.toLocaleString(),"Games backtested"],
  [D.upcoming.length,"Games left this season"],
].map(([k,l])=>`<div class="tile"><div class="k mono">${k}</div><div class="l">${l}</div></div>`).join("");

/* chips */
const chip = (t)=>`<span class="chip" style="background:#${esc(t.color)}" title="${esc(t.name)}"></span>`;

/* upcoming games grouped by local date */
const dayKey = (d)=>d.toLocaleDateString(undefined,{weekday:"long",month:"long",day:"numeric"});
function gameCard(g){
  const h=teams[g.home], a=teams[g.away];
  const ph=g.win_prob_home, hFav=ph>=.5;
  const time=new Date(g.date).toLocaleTimeString(undefined,{hour:"numeric",minute:"2-digit"});
  const favAbbr=hFav?h.abbr:a.abbr;
  const line=(hFav?-g.spread_home:g.spread_home).toFixed(1);
  return `<div class="game">
    <div class="meta"><span class="n">${time}</span>
      <span>${esc(g.venue||"")}</span>${g.neutral?"<span>&middot; neutral court</span>":""}</div>
    <div class="teamline ${hFav?"":"fav"}">${chip(a)}<span class="abbr">${esc(a.abbr)}</span>
      <span class="rec">${a.wins}&ndash;${a.losses} &middot; #${a.rank}</span>
      <span class="proj mono">${g.away_pts.toFixed(0)}</span></div>
    <div class="teamline ${hFav?"fav":""}">${chip(h)}<span class="abbr">${esc(h.abbr)}</span>
      <span class="rec">${h.wins}&ndash;${h.losses} &middot; #${h.rank}</span>
      <span class="proj mono">${g.home_pts.toFixed(0)}</span></div>
    <div class="probbar" role="img" aria-label="${esc(a.abbr)} ${fmtPct(1-ph)}, ${esc(h.abbr)} ${fmtPct(ph)}">
      <div class="a" style="flex:${(1-ph).toFixed(3)}"></div><div class="h" style="flex:${ph.toFixed(3)}"></div></div>
    <div class="probpct mono"><span>${esc(a.abbr)} ${fmtPct(1-ph)}</span><span>${esc(h.abbr)} ${fmtPct(ph)}</span></div>
    <div class="pick"><span>Pick <b>${esc(favAbbr)} ${line}</b></span>
      <span>Total <b class="mono">${g.total.toFixed(1)}</b></span>
      <span>Proj <b class="mono">${g.away_pts.toFixed(0)}&ndash;${g.home_pts.toFixed(0)}</b></span></div>
  </div>`;
}
let showAll=false;
function renderGames(){
  const now=Date.now()-3*3600e3;
  const horizon=Date.now()+8*86400e3;
  let list=D.upcoming.filter(g=>new Date(g.date)>now);
  if(!showAll) list=list.filter(g=>new Date(g.date)<horizon);
  const byDay={};
  for(const g of list){ const k=dayKey(new Date(g.date)); (byDay[k]=byDay[k]||[]).push(g); }
  $("#gamesroot").innerHTML=Object.entries(byDay).map(([day,gs])=>
    `<div class="daylabel">${day}</div><div class="games">${gs.map(gameCard).join("")}</div>`).join("")
    || "<p style='color:var(--ink2)'>No games scheduled in this window.</p>";
  $("#showmore").textContent=showAll?"Show next 8 days only":"Show full remaining schedule ("+D.upcoming.length+" games)";
}
$("#showmore").addEventListener("click",()=>{showAll=!showAll;renderGames();});
renderGames();

/* simulator */
const ids=D.rankings;
for(const sel of [$("#selAway"),$("#selHome")]){
  sel.innerHTML=ids.map(id=>`<option value="${id}">${esc(teams[id].name)} (${teams[id].rating.toFixed(0)})</option>`).join("");
  sel.addEventListener("change",sim);
}
$("#selHome").value=ids[0]; $("#selAway").value=ids[1];
$("#neutral").addEventListener("change",sim);
function sim(){
  const h=teams[$("#selHome").value], a=teams[$("#selAway").value];
  if(h.id===a.id){$("#simout").innerHTML="<div class='simhead'>Pick two different teams.</div>";return;}
  let diff=h.rating-a.rating+($("#neutral").checked?0:P.home_adv);
  const ph=1/(1+Math.pow(10,-diff/400));
  const spread=diff/P.elo_per_point;
  const total=(h.off+a.deff)/2+(a.off+h.deff)/2+(P.total_adjust||0);
  const hp=(total+spread)/2, ap=(total-spread)/2;
  const fav=ph>=.5?h:a, pf=Math.max(ph,1-ph);
  $("#simout").innerHTML=`
    <div class="simhead"><span class="fav">${esc(fav.name)}</span> win ${fmtPct(pf)} of the time</div>
    <div class="probbar" style="max-width:520px"><div class="a" style="flex:${(1-ph).toFixed(3)}"></div><div class="h" style="flex:${ph.toFixed(3)}"></div></div>
    <div class="probpct mono" style="max-width:520px"><span>${esc(a.abbr)} ${fmtPct(1-ph)}</span><span>${esc(h.abbr)} ${fmtPct(ph)}</span></div>
    <div class="simdetail">
      <span>Spread <b>${esc(fav.abbr)} ${(ph>=.5?-spread:spread).toFixed(1)}</b></span>
      <span>Projected score <b class="mono">${esc(a.abbr)} ${ap.toFixed(0)} &ndash; ${esc(h.abbr)} ${hp.toFixed(0)}</b></span>
      <span>Total <b class="mono">${total.toFixed(1)}</b></span>
      <span>Elo edge <b class="mono">${diff>=0?"+":""}${diff.toFixed(0)}</b></span>
    </div>`;
}
sim();

/* rankings + sparklines */
const tip=$("#tip");
function sparkline(t){
  const pts=t.trajectory; if(!pts||pts.length<2) return "";
  const w=150,hh=34,pad=3;
  const vals=pts.map(p=>p[1]);
  const lo=Math.min(...vals),hi=Math.max(...vals),span=(hi-lo)||1;
  const xy=vals.map((v,i)=>[pad+i*(w-2*pad)/(vals.length-1), hh-pad-(v-lo)*(hh-2*pad)/span]);
  const poly=xy.map(p=>p[0].toFixed(1)+","+p[1].toFixed(1)).join(" ");
  const last=xy[xy.length-1];
  return `<svg class="spark" width="${w}" height="${hh}" data-team="${t.id}" role="img" aria-label="${esc(t.abbr)} Elo trend">
    <polyline points="${poly}"></polyline>
    <circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="3"></circle></svg>`;
}
$("#rankbody").innerHTML=ids.map((id,i)=>{
  const t=teams[id];
  return `<tr><td class="rank mono">${i+1}</td>
    <td><span class="tname">${chip(t)}${esc(t.name)}</span></td>
    <td class="r mono">${t.wins}&ndash;${t.losses}</td>
    <td class="r mono" style="font-weight:800">${t.rating.toFixed(0)}</td>
    <td>${sparkline(t)}</td>
    <td class="r mono">${t.off==null?"—":t.off.toFixed(1)}</td>
    <td class="r mono">${t.deff==null?"—":t.deff.toFixed(1)}</td></tr>`;
}).join("");
document.querySelectorAll(".spark").forEach(svg=>{
  svg.addEventListener("mousemove",(e)=>{
    const t=teams[svg.dataset.team], pts=t.trajectory;
    const r=svg.getBoundingClientRect();
    const i=Math.max(0,Math.min(pts.length-1,Math.round((e.clientX-r.left-3)/(r.width-6)*(pts.length-1))));
    tip.textContent=pts[i][0]+"  Elo "+pts[i][1].toFixed(0);
    tip.style.display="block";
    tip.style.left=Math.min(e.clientX+12,innerWidth-140)+"px";
    tip.style.top=(e.clientY-32)+"px";
  });
  svg.addEventListener("mouseleave",()=>tip.style.display="none");
});

/* recent results */
$("#recentroot").innerHTML=D.recent.map(g=>{
  const h=teams[g.home],a=teams[g.away];
  const homeWon=g.home_score>g.away_score;
  const picked=g.win_prob_home>=.5;
  const hit=picked===homeWon;
  const conf=Math.max(g.win_prob_home,1-g.win_prob_home);
  const d=new Date(g.date).toLocaleDateString(undefined,{month:"short",day:"numeric"});
  return `<div class="res">
    <span class="date mono">${d}</span>
    <span class="who">${esc(a.abbr)} @ ${esc(h.abbr)}</span>
    <span class="score mono">${g.away_score}&ndash;${g.home_score}</span>
    <span class="pill ${hit?"hit":"miss"}">${hit?"hit":"miss"} ${fmtPct(conf)}</span></div>`;
}).join("");

/* about */
$("#about").innerHTML=`
  <p>Every WNBA game since 2010 (${M.all.n.toLocaleString()} rated matchups since ${M.eval_from}) runs through a
  <b>margin-of-victory-adjusted Elo model</b> in strict chronological order &mdash; each prediction is made
  before the model sees that game's result, so the accuracy numbers above are honest out-of-sample figures.</p>
  <p>The rating update follows the FiveThirtyEight NBA design, re-tuned for the WNBA by grid-search backtest:
  <code>K=${P.k}</code>, home-court advantage <code>${P.home_adv} Elo</code> (&asymp;${(P.home_adv/P.elo_per_point).toFixed(1)} pts, skipped on neutral courts),
  season carryover <code>${Math.round(P.carryover*100)}%</code>, and <code>${P.elo_per_point} Elo = 1 point</code> of spread.
  A small rest edge (<code>${P.rest_bonus} Elo/day</code>, capped at 3 days) rewards the fresher team.
  Totals blend each side's recency-weighted scoring and defense.</p>
  <p><b>What it doesn't know:</b> injuries, trades, and who's actually in uniform tonight &mdash; check the injury
  report before trusting a tight line. Expansion teams (Portland, Toronto) carry wider uncertainty in their first season.
  Typical spread error is &plusmn;${(+M.all.spread_mae).toFixed(0)} points; that is the nature of a high-variance league, not a bug.</p>`;
</script>
