name: Update data & site

on:
  workflow_dispatch: {}
  schedule:
    # Twice daily during the season: after West-coast games end (~07:00 UTC)
    # and before the evening slate (~16:00 UTC).
    - cron: "0 7 * * *"
    - cron: "0 16 * * *"

permissions:
  contents: write

concurrency:
  group: update-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch wehoop data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python pipeline/fetch_data.py

      - name: Commit refreshed data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/
          git diff --cached --quiet || git commit -m "data: refresh wehoop parquet files"

      - name: Build site
        run: python pipeline/build_site.py

      - name: Commit rebuilt site
        run: |
          git add -A docs/
          git diff --cached --quiet || git commit -m "site: rebuild predictions"

      - name: Push
        run: git push
